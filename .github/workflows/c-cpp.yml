name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Compile C++ files
      run: |
        find . -name "*.cpp" -type f | while read file; do
          g++ -std=c++17 -o "${file%.cpp}" "$file" && echo "✓ Compiled: $file" || echo "✗ Failed: $file"
        done
